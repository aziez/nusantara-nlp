name: 🚀 Test, Build & Publish to PyPI

# Trigger: hanya berjalan saat ada push tag versi (contoh: v0.2.0, v1.0.0)
on:
  push:
    tags:
      - "v*.*.*"   # contoh: v0.2.0

# Izin yang dibutuhkan oleh GitHub OIDC untuk Trusted Publishing
permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Jalankan semua unit test dulu, baru build & upload jika lulus
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: ✅ Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies & library
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Jalankan pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Build distribusi (wheel + sdist) — hanya jika test lulus
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: 📦 Build Distribution
    runs-on: ubuntu-latest
    needs: test   # Hanya jalan setelah job 'test' berhasil

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel (.whl) dan source distribution (.tar.gz)
        run: python -m build

      - name: Upload artifact dist/ untuk dipakai oleh job publish
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────
  # JOB 3: Upload ke PyPI — hanya jika build berhasil
  # Menggunakan Trusted Publishing (tanpa PYPI_TOKEN, lebih aman)
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: 🎯 Publish to PyPI
    runs-on: ubuntu-latest
    needs: build   # Hanya jalan setelah job 'build' berhasil
    environment:
      name: pypi
      url: https://pypi.org/p/nusantara-nlp

    steps:
      - name: Download artifact dari job build
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish ke PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
